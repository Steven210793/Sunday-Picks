<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>Sunday Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
:root {
  --bg:#0B1629;--bg2:#0F1E36;--card:#13203A;--card2:#192B47;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --red:#E8233A;--green:#22C55E;--gold:#F5A623;
  --text:#E8EDF5;--muted:#6B7F9E;--muted2:#4A5C75;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);}
.app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;}
.scr{display:none;flex:1;overflow-y:auto;flex-direction:column;-webkit-overflow-scrolling:touch;}
.scr.on{display:flex;}
.scr::-webkit-scrollbar{display:none;}
.bnav{display:none;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;}
.bnav.show{display:flex;}
.bnav button{flex:1;background:none;border:none;padding:10px 0 8px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--fb);font-size:10px;font-weight:600;letter-spacing:0.5px;}
.bnav button.act{color:var(--red);}
.bnav button svg{width:22px;height:22px;}
.btn-red{width:100%;padding:15px;background:var(--red);border:none;border-radius:12px;color:#fff;font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.box-err{background:rgba(232,35,58,0.1);border:1px solid rgba(232,35,58,0.3);border-radius:10px;padding:12px 16px;color:var(--red);font-size:13px;margin-bottom:12px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;}
.modal-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;}
.modal-header{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-list{overflow-y:auto;flex:1;padding:8px 0;}
.modal-list::-webkit-scrollbar{display:none;}
.modal-item{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer;}
.modal-item:active{background:var(--card);}
.search-box{padding:10px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-input{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;}
.prog-bar-bg{background:var(--card2);border-radius:4px;height:6px;margin-bottom:16px;}
.prog-bar{background:linear-gradient(90deg,var(--red),#ff6b35);height:6px;border-radius:4px;transition:width 0.6s ease;}
@keyframes sp{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="app">

<!-- ONBOARDING -->
<div class="scr on" id="sc-onboard" style="flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;">
  <img src="https://i.imgur.com/qaj1nmJ.png" style="width:100px;height:100px;margin-bottom:32px;"/>
  <div style="font-family:var(--fd);font-size:52px;font-weight:900;letter-spacing:2px;text-align:center;line-height:1;margin-bottom:8px;">SUNDAY<br/><span style="color:var(--red);">PICKS</span></div>
  <div style="font-size:15px;color:var(--muted);text-align:center;margin-bottom:48px;letter-spacing:1px;">Pronos. Analyse. Performance.</div>
  <div style="width:100%;">
    <div style="font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:10px;">TON PSEUDO</div>
    <input id="ob-pseudo" type="text" placeholder="GolfAddict" maxlength="20" autocomplete="off"
      style="width:100%;padding:14px 18px;background:var(--card2);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-family:var(--fb);font-size:16px;outline:none;margin-bottom:24px;"/>
    <button class="btn-red" onclick="startApp()">COMMENCER →</button>
  </div>
</div>

<!-- HOME -->
<div class="scr" id="sc-home">
  <div style="padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <img src="https://i.imgur.com/qaj1nmJ.png" style="width:40px;height:40px;border-radius:50%;"/>
    <div style="font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:2px;color:var(--muted);" id="h-greet">BONJOUR</div>
  </div>
  <div style="padding:0 18px 100px;flex:1;">

    <!-- TOURNOI CARD -->
    <div style="background:linear-gradient(135deg,#162847,#0F1E36 60%,#1a0a0a);border:1px solid var(--border2);border-radius:16px;margin-bottom:16px;overflow:hidden;">
      <div style="padding:18px;">
        <div id="h-livebadge" style="margin-bottom:6px;"></div>
        <div style="font-family:var(--fd);font-size:26px;font-weight:900;line-height:1.1;letter-spacing:1px;margin-bottom:4px;" id="h-tname">Chargement...</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="h-tloc">—</span>
        </div>
        <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:14px;margin-bottom:16px;">
          <div style="font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:8px;">FIN DES PICKS DANS</div>
          <div style="display:flex;gap:8px;justify-content:center;">
            <div style="text-align:center;"><div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);" id="h-d">00</div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;">JOURS</div></div>
            <div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);padding-top:4px;">:</div>
            <div style="text-align:center;"><div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);" id="h-h">00</div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;">HRS</div></div>
            <div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);padding-top:4px;">:</div>
            <div style="text-align:center;"><div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);" id="h-m">00</div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;">MIN</div></div>
            <div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);padding-top:4px;">:</div>
            <div style="text-align:center;"><div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);" id="h-s">00</div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;">SEC</div></div>
          </div>
        </div>
        <button class="btn-red" id="h-picksbtn" onclick="goToPicks()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          FAIRE MES PICKS
        </button>
      </div>
    </div>

    <!-- SCORE -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;">
      <div style="flex:1;">
        <div style="font-family:var(--fd);font-size:44px;font-weight:900;line-height:1;"><span id="h-score">0</span> <span style="font-size:18px;color:var(--muted);">PTS</span></div>
        <div style="font-family:var(--fd);font-size:13px;font-weight:800;letter-spacing:2px;color:var(--red);margin-top:2px;" id="h-badge-name">MONSIEUR PROVISOIRE</div>
      </div>
      <div style="font-size:52px;" id="h-badge-img">🏌️</div>
    </div>

    <!-- PROGRESSION -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div style="font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);">PROGRESSION</div>
      <div style="font-size:12px;" id="h-prog-txt"></div>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar" id="h-prog-bar" style="width:0%;"></div></div>

    <!-- PROCHAINS -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:3px;color:var(--muted);">PROCHAINS TOURNOIS</div>
    </div>
    <div id="h-prochains"></div>
  </div>
</div>

<!-- PICKS -->
<div class="scr" id="sc-picks">
  <div style="padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);">
    <button onclick="navTo('home')" style="background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;line-height:1;">←</button>
    <div style="font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:1px;flex:1;text-align:center;" id="pk-title">MES PICKS</div>
    <button onclick="savePicks()" style="background:none;border:none;color:var(--red);font-family:var(--fd);font-size:15px;font-weight:800;letter-spacing:1px;cursor:pointer;">Valider</button>
  </div>
  <div id="pk-content" style="padding:16px 18px 160px;flex:1;overflow-y:auto;"></div>
  <div id="vbar" style="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 18px;background:var(--bg2);border-top:1px solid var(--border);">
    <button class="btn-red" id="vbtn" onclick="savePicks()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      VALIDER MES PICKS
    </button>
  </div>
</div>

<!-- CLASSEMENT -->
<div class="scr" id="sc-class">
  <div style="padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);">
    <div style="font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:2px;">CLASSEMENT</div>
  </div>
  <div id="cl-content" style="padding:16px 18px 100px;flex:1;overflow-y:auto;"></div>
</div>

<!-- PROFIL -->
<div class="scr" id="sc-profil" style="padding:16px 18px 100px;">
  <div style="font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:2px;margin-bottom:20px;">MON PROFIL</div>
  <div id="profil-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bnav">
  <button onclick="navTo('home')" id="nav-home" class="act">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </button>
  <button onclick="navTo('class')" id="nav-class">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Classement
  </button>
  <button onclick="goToPicks()" id="nav-picks">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Picks
  </button>
  <button onclick="navTo('profil')" id="nav-profil">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profil
  </button>
</nav>
</div>

// ============================================================
// STATE
// ============================================================
var S = {
  pseudo:"", pts:0, history:[],
  tid:null,
  picks:{top3:[null,null,null],tenPicks:{},tenPlayers:[]},
  saved:false
};

function saveS() {
  localStorage.setItem(STORE_KEY, JSON.stringify({
    pseudo:S.pseudo, pts:S.pts, history:S.history,
    tid:S.tid, picks:S.picks, saved:S.saved
  }));
}
function loadS() {
  try {
    var d = JSON.parse(localStorage.getItem(STORE_KEY)||"{}");
    S.pseudo  = d.pseudo  || "";
    S.pts     = d.pts     || 0;
    S.history = d.history || [];
    S.tid     = d.tid     || null;
    S.picks   = d.picks   || {top3:[null,null,null],tenPicks:{},tenPlayers:[]};
    S.saved   = d.saved   || false;
  } catch(e){}
}

// ============================================================
// HELPERS
// ============================================================
var BADGES_SORTED = BADGES.slice().sort(function(a,b){return b.pts-a.pts;});
function getBadge(pts) {
  for(var i=0;i<BADGES_SORTED.length;i++){if(pts>=BADGES_SORTED[i].pts)return BADGES_SORTED[i];}
  return BADGES[0];
}
function getNextBadge(pts) {
  for(var i=0;i<BADGES.length;i++){if(BADGES[i].pts>pts)return BADGES[i];}
  return null;
}
function getProgress(pts) {
  var cur=getBadge(pts),nxt=getNextBadge(pts);
  if(!nxt)return 100;
  return Math.min(100,Math.round((pts-cur.pts)/(nxt.pts-cur.pts)*100));
}
function fmtDate(d) {
  if(!d)return"—";
  var dt=d instanceof Date?d:new Date(d);
  return dt.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
}
function pad(n){return String(n).padStart(2,"0");}
function todayStr(){return new Date().toISOString().substring(0,10);}

// ============================================================
// FIXTURES LOGIC
// ============================================================
function initFixtures() {
  var today = todayStr();
  S.fixtures = PGA_FIXTURES.map(function(f) {
    var deadline;
    // If tournament ends this week (on or before May 26), keep picks open
    if (f.end <= "2026-05-26") {
      deadline = new Date("2026-05-26T22:00:00Z");
    } else {
      // Deadline = start of tournament day at midnight UTC
      deadline = new Date(f.start + "T00:00:00Z");
    }
    return {
      id: f.id, name: f.name, loc: f.loc,
      start: new Date(f.start), end: new Date(f.end),
      deadline: deadline, major: f.major || false
    };
  });

  // Find current tournament
  var now = new Date();
  var today2 = todayStr();
  var cur = null;

  // 1. Tournament happening today
  for(var i=0;i<PGA_FIXTURES.length;i++){
    var f=PGA_FIXTURES[i];
    if(f.start<=today2 && f.end>=today2){cur=S.fixtures[i];break;}
  }
  // 2. Next upcoming tournament
  if(!cur){
    for(var j=0;j<PGA_FIXTURES.length;j++){
      if(PGA_FIXTURES[j].start>today2){cur=S.fixtures[j];break;}
    }
  }

  if(cur){
    if(cur.id !== S.tid){
      S.tid = cur.id;
      S.picks = {top3:[null,null,null],tenPicks:{},tenPlayers:[]};
      S.saved = false;
      saveS();
    }
  }

  // Players are always PGA_PLAYERS
  S.players = PGA_PLAYERS.slice();
  if(!S.picks.tenPlayers||!S.picks.tenPlayers.length){
    S.picks.tenPlayers = genTen();
    saveS();
  }

  renderHome();
  renderProchains();
}

// ============================================================
// CURRENT TOURNAMENT
// ============================================================
function getCur() {
  for(var i=0;i<S.fixtures.length;i++){
    if(S.fixtures[i].id===S.tid)return S.fixtures[i];
  }
  return null;
}

function isDeadlinePassed() {
  var cur=getCur();
  if(!cur)return false;
  return new Date()>new Date(cur.deadline);
}

// ============================================================
// TIMER
// ============================================================
var tmrId=null;
function startTimer() {
  if(tmrId)clearInterval(tmrId);
  function tick(){
    var cur=getCur();
    if(!cur)return;
    var diff=new Date(cur.deadline)-new Date();
    var ids=["h-d","h-h","h-m","h-s"];
    if(diff<=0){ids.forEach(function(id){var e=document.getElementById(id);if(e)e.textContent="00";});return;}
    var tot=Math.floor(diff/1000);
    var vals=[Math.floor(tot/86400),Math.floor((tot%86400)/3600),Math.floor((tot%3600)/60),tot%60];
    ids.forEach(function(id,i){var e=document.getElementById(id);if(e)e.textContent=pad(vals[i]);});
  }
  tick();
  tmrId=setInterval(tick,1000);
}

// ============================================================
// RENDER HOME
// ============================================================
function renderHome() {
  var cur=getCur();
  var badge=getBadge(S.pts);
  var nxt=getNextBadge(S.pts);
  var prog=getProgress(S.pts);
  var h=new Date().getHours();

  var greet=document.getElementById("h-greet");
  if(greet)greet.textContent=(h<18?"BONJOUR ":"BONSOIR ")+S.pseudo.toUpperCase();

  if(cur){
    var tn=document.getElementById("h-tname");
    var tl=document.getElementById("h-tloc");
    var lb=document.getElementById("h-livebadge");
    var btn=document.getElementById("h-picksbtn");

    if(tn)tn.textContent=cur.name;
    if(tl)tl.textContent=cur.loc||"—";

    // Live badge
    var today=todayStr();
    var curStart=cur.start instanceof Date?cur.start.toISOString().substring(0,10):cur.start;
    var curEnd=cur.end instanceof Date?cur.end.toISOString().substring(0,10):cur.end;
    var isLive=curStart<=today&&curEnd>=today;
    if(lb)lb.innerHTML=isLive
      ?'<div style="display:inline-flex;align-items:center;gap:5px;background:var(--red);color:#fff;font-family:var(--fd);font-size:11px;font-weight:800;letter-spacing:2px;padding:4px 10px;border-radius:6px;margin-bottom:6px;"><div style="width:6px;height:6px;border-radius:50%;background:#fff;animation:sp 1.2s infinite;"></div>LIVE</div>'
      :'';

    // Major badge
    if(cur.major&&lb){
      lb.innerHTML+='<div style="display:inline-flex;align-items:center;gap:5px;background:var(--gold);color:#000;font-family:var(--fd);font-size:11px;font-weight:800;letter-spacing:2px;padding:4px 10px;border-radius:6px;margin-bottom:6px;margin-left:6px;">⭐ MAJEUR</div>';
    }

    // Button
    if(btn){
      if(isDeadlinePassed()&&!S.saved){
        btn.style.background="var(--muted2)";
        btn.innerHTML="🔒 PICKS FERMÉS";
        btn.onclick=null;
      } else if(S.saved){
        btn.style.background="#16A34A";
        btn.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> PICKS ENREGISTRÉS';
        btn.onclick=goToPicks;
      } else {
        btn.style.background="var(--red)";
        btn.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg> FAIRE MES PICKS';
        btn.onclick=goToPicks;
      }
    }
  }

  var se=document.getElementById("h-score");
  var be=document.getElementById("h-badge-name");
  var bi=document.getElementById("h-badge-img");
  var pb=document.getElementById("h-prog-bar");
  var pt=document.getElementById("h-prog-txt");
  if(se)se.textContent=S.pts;
  if(be)be.textContent=badge.name.toUpperCase();
  if(bi)bi.textContent=badge.emoji;
  if(pb)pb.style.width=prog+"%";
  if(pt&&nxt)pt.innerHTML='<span style="color:var(--red);">'+nxt.pts+' pts → '+nxt.name+'</span>';

  startTimer();
}

// ============================================================
// RENDER PROCHAINS
// ============================================================
function renderProchains() {
  var el=document.getElementById("h-prochains");
  if(!el)return;
  var today=todayStr();
  var list=S.fixtures.filter(function(f){
    var fEnd=f.end instanceof Date?f.end.toISOString().substring(0,10):(f.end||"");
    return f.id!==S.tid&&fEnd>=today;
  }).slice(0,8);

  if(!list.length){
    el.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">Aucun tournoi à venir</div>';
    return;
  }
  var h="";
  list.forEach(function(t){
    var bgC=t.major?'rgba(245,166,35,0.15)':'rgba(232,35,58,0.15)';
    var borderC=t.major?'var(--gold)':'var(--red)';
    var labelC=t.major?'var(--gold)':'var(--red)';
    var label=t.major?'⭐':'PGA';
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;">';
    h+='<div style="width:40px;height:40px;background:'+bgC+';border:1.5px solid '+borderC+';border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">';
    h+='<span style="font-family:var(--fd);font-size:10px;font-weight:900;color:'+labelC+';">'+label+'</span></div>';
    h+='<div style="flex:1;">';
    h+='<div style="font-family:var(--fd);font-size:15px;font-weight:700;">'+t.name+'</div>';
    h+='<div style="font-size:12px;color:var(--muted);margin-top:2px;">'+fmtDate(t.start)+' — '+fmtDate(t.end)+'</div>';
    h+='</div></div>';
  });
  el.innerHTML=h;
}

// ============================================================
// PICKS
// ============================================================
function genTen() {
  var top=S.players.slice(0,5).map(function(p){return p.id;});
  var rest=S.players.slice(5,50).sort(function(){return Math.random()-0.5;}).slice(0,5).map(function(p){return p.id;});
  return top.concat(rest);
}
function getP(id){
  for(var i=0;i<S.players.length;i++){if(S.players[i].id===id)return S.players[i];}
  return null;
}
function picksDone(){
  var p=S.picks;
  if(p.top3.filter(Boolean).length<3)return false;
  var ten=p.tenPlayers||[];
  for(var i=0;i<10&&i<ten.length;i++){if(!p.tenPicks[ten[i]])return false;}
  return true;
}

  var el=document.getElementById("pk-content");
  if(!el)return;
  var cur=getCur();
  var title=document.getElementById("pk-title");
  if(title&&cur){var t=cur.name.length>20?cur.name.substring(0,20)+"...":cur.name;title.textContent=t.toUpperCase();}

  if(isDeadlinePassed()){
    var vbar=document.getElementById("vbar");
    if(vbar)vbar.style.display="none";
    el.innerHTML='<div style="text-align:center;padding:60px 24px;">'+
      '<div style="font-size:64px;margin-bottom:16px;">🔒</div>'+
      '<div style="font-family:var(--fd);font-size:24px;font-weight:900;letter-spacing:1px;margin-bottom:8px;">PICKS FERMÉS</div>'+
      '<div style="font-size:14px;color:var(--muted);line-height:1.5;">Le tournoi est en cours.<br/>Les picks sont verrouillés.</div>'+
      (S.saved?'<div style="margin-top:24px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:16px;"><div style="font-family:var(--fd);font-size:14px;font-weight:700;color:var(--green);margin-bottom:6px;">TES PICKS ENREGISTRÉS ✓</div><div style="font-size:13px;color:var(--muted);">Attends les résultats !</div></div>':'')+
      '</div>';
    return;
  }

  var vbar2=document.getElementById("vbar");
  var vbtn=document.getElementById("vbtn");
  if(vbar2)vbar2.style.display="block";
  if(vbtn)vbtn.disabled=!picksDone();

  var p=S.picks;
  var html="";
  var medals=["🥇 1ER","🥈 2ÈME","🥉 3ÈME"];

  html+='<div style="font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:12px;">TON TOP 3</div>';
  for(var i=0;i<3;i++){
    var pid=p.top3[i];
    var pl=pid?getP(pid):null;
    html+='<div onclick="openModal(\'top3\','+i+')" style="background:var(--card);border:1px solid '+(pl?'var(--border2)':'rgba(232,35,58,0.4)')+';border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">';
    html+='<div style="display:flex;align-items:center;gap:10px;"><span style="font-family:var(--fd);font-size:13px;font-weight:700;color:var(--muted);">'+medals[i]+'</span>';
    if(pl){html+='<div><div style="font-family:var(--fd);font-size:15px;font-weight:800;">'+pl.name+'</div><div style="font-size:11px;color:var(--muted);">×'+pl.coeff+' · FedEx #'+pl.wr+'</div></div>';}
    else{html+='<span style="color:var(--muted);font-size:14px;">Choisir un joueur</span>';}
    html+='</div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>';
  }

  html+='<div style="font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);margin:20px 0 12px;">TES 10 PICKS</div>';
  var ten=p.tenPlayers&&p.tenPlayers.length?p.tenPlayers:genTen();
  for(var j=0;j<10&&j<ten.length;j++){
    var tp=getP(ten[j]);
    if(!tp)continue;
    var cat=p.tenPicks[ten[j]]||"";
    html+='<div onclick="openModal(\'ten\',\''+ten[j]+'\')" style="background:var(--card);border:1px solid '+(cat?'var(--border2)':'rgba(232,35,58,0.4)')+';border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">';
    html+='<div><div style="font-family:var(--fd);font-size:15px;font-weight:800;">'+tp.name+'</div><div style="font-size:11px;color:var(--muted);">×'+tp.coeff+' · FedEx #'+tp.wr+'</div></div>';
    html+='<div style="font-family:var(--fd);font-size:12px;font-weight:700;color:'+(cat?'var(--green)':'var(--red)')+'">'+(cat||"CHOISIR")+'</div></div>';
  }
  el.innerHTML=html;
}

// ============================================================
// MODAL
// ============================================================
var modalType=null,modalIdx=null;
function openModal(type,idx){
  modalType=type;modalIdx=idx;
  var bg=document.getElementById("modal-bg");
  if(bg){bg.style.display="flex";renderModal();return;}
  var div=document.createElement("div");
  div.id="modal-bg";div.className="modal-bg";
  div.innerHTML='<div class="modal-box"><div class="modal-header"><div style="font-family:var(--fd);font-size:16px;font-weight:800;letter-spacing:1px;" id="modal-title">CHOISIR</div><button onclick="closeModal()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;">×</button></div><div class="search-box"><input class="search-input" id="modal-search" placeholder="Rechercher..." oninput="filterModal(this.value)" autocomplete="off"/></div><div class="modal-list" id="modal-list"></div></div>';
  document.querySelector(".app").appendChild(div);
  renderModal();
}
function renderModal(){
  var title=document.getElementById("modal-title");
  var search=document.getElementById("modal-search");
  if(search)search.value="";
  if(modalType==="top3"){
    if(title)title.textContent="CHOISIR — "+["1ER","2ÈME","3ÈME"][modalIdx];
    filterModal("");
  } else if(modalType==="ten"){
    if(title)title.textContent="PRONOSTIC";
    var cats=["Top 5","Top 10","Top 20","Top 30","Make Cut"];
    var tp=getP(modalIdx);
    var html=tp?'<div style="padding:14px 18px;border-bottom:1px solid var(--border);"><div style="font-family:var(--fd);font-size:16px;font-weight:800;">'+tp.name+'</div><div style="font-size:12px;color:var(--muted);">×'+tp.coeff+' · FedEx #'+tp.wr+'</div></div>':"";
    cats.forEach(function(c){html+='<div class="modal-item" onclick="selectCat(\''+modalIdx+'\',\''+c+'\')"><span>'+c+'</span><span style="font-size:13px;color:var(--muted);">×'+(tp?tp.coeff:"?")+'</span></div>';});
    var listEl=document.getElementById("modal-list");
    if(listEl)listEl.innerHTML=html;
  }
}
function filterModal(q){
  var listEl=document.getElementById("modal-list");
  if(!listEl)return;
  var q2=q.toLowerCase().trim();
  var fil=S.players.filter(function(p){return p.name.toLowerCase().indexOf(q2)!==-1;}).slice(0,80);
  var html="";
  fil.forEach(function(p){
    var sel=S.picks.top3.indexOf(p.id)!==-1;
    html+='<div class="modal-item" onclick="selectPlayer(\''+p.id+'\')" style="'+(sel?'opacity:0.4;pointer-events:none;':'')+'">';
    html+='<div><div style="font-family:var(--fd);font-size:15px;font-weight:700;">'+p.name+'</div><div style="font-size:11px;color:var(--muted);">×'+p.coeff+' · FedEx #'+(p.wr===999?'—':p.wr)+'</div></div>';
    html+='<span style="font-family:var(--fd);font-size:14px;color:var(--muted);">×'+p.coeff+'</span></div>';
  });
  listEl.innerHTML=html||'<div style="text-align:center;padding:20px;color:var(--muted);">Aucun résultat</div>';
}
function selectPlayer(id){S.picks.top3[modalIdx]=id;saveS();closeModal();renderPicks();}
function selectCat(pid,cat){S.picks.tenPicks[pid]=cat;saveS();closeModal();renderPicks();}
function closeModal(){var bg=document.getElementById("modal-bg");if(bg)bg.style.display="none";}

// ============================================================
// SAVE PICKS
// ============================================================
function savePicks(){
  if(!picksDone()){alert("Complete tes 3 tops et tes 10 picks d'abord !");return;}
  S.saved=true;saveS();renderHome();renderPicks();navTo("home");
}

// ============================================================
// NAVIGATION
// ============================================================
var SCREENS={home:"sc-home",class:"sc-class",picks:"sc-picks",profil:"sc-profil"};
function navTo(tab){
  Object.keys(SCREENS).forEach(function(k){
    var el=document.getElementById(SCREENS[k]);
    if(el)el.classList.toggle("on",k===tab);
  });
  document.querySelectorAll(".bnav button").forEach(function(b){b.classList.remove("act");});
  var nb=document.getElementById("nav-"+tab);
  if(nb)nb.classList.add("act");
  if(tab==="picks")renderPicks();
  if(tab==="class")renderClassement();
  if(tab==="profil")renderProfil();
}
function goToPicks(){navTo("picks");}

// ============================================================
// CLASSEMENT
// ============================================================
function renderClassement(){
  var el=document.getElementById("cl-content");
  if(!el)return;
  var html='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">';
  var badge=getBadge(S.pts);
  html+='<div style="font-family:var(--fd);font-size:24px;font-weight:900;color:var(--gold);width:30px;">1</div>';
  html+='<div style="font-size:28px;">'+badge.emoji+'</div>';
  html+='<div style="flex:1;"><div style="font-family:var(--fd);font-size:16px;font-weight:800;">'+S.pseudo+'</div><div style="font-size:12px;color:var(--muted);">'+badge.name+'</div></div>';
  html+='<div style="font-family:var(--fd);font-size:20px;font-weight:900;">'+S.pts+'<span style="font-size:12px;color:var(--muted);"> pts</span></div></div>';
  el.innerHTML=html;
}

// ============================================================
// PROFIL
// ============================================================
function renderProfil(){
  var el=document.getElementById("profil-content");
  if(!el)return;
  var badge=getBadge(S.pts);
  var nxt=getNextBadge(S.pts);
  var prog=getProgress(S.pts);
  var html='<div style="text-align:center;padding:20px 0 32px;">';
  html+='<div style="font-size:72px;margin-bottom:8px;">'+badge.emoji+'</div>';
  html+='<div style="font-family:var(--fd);font-size:28px;font-weight:900;">'+S.pseudo.toUpperCase()+'</div>';
  html+='<div style="font-family:var(--fd);font-size:16px;color:var(--red);font-weight:700;letter-spacing:1px;margin-top:4px;">'+badge.name.toUpperCase()+'</div>';
  html+='<div style="font-family:var(--fd);font-size:40px;font-weight:900;margin-top:16px;">'+S.pts+' <span style="font-size:18px;color:var(--muted);">pts</span></div>';
  html+='</div>';
  if(nxt){
    html+='<div style="margin-bottom:24px;"><div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--muted);"><span>Vers '+nxt.name+'</span><span>'+prog+'%</span></div>';
    html+='<div class="prog-bar-bg"><div class="prog-bar" style="width:'+prog+'%;"></div></div></div>';
  }
  if(S.history.length){
    html+='<div style="font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:12px;">HISTORIQUE</div>';
    S.history.slice().reverse().forEach(function(h){
      html+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">';
      html+='<div><div style="font-family:var(--fd);font-size:15px;font-weight:700;">'+h.name+'</div><div style="font-size:12px;color:var(--muted);">'+fmtDate(h.date)+'</div></div>';
      html+='<div style="font-family:var(--fd);font-size:18px;font-weight:900;color:var(--gold);">+'+h.pts+' pts</div></div>';
    });
  }
  el.innerHTML=html;
}

// ============================================================
// START
// ============================================================
function startApp(){
  var pseudo=document.getElementById("ob-pseudo").value.trim();
  if(!pseudo){alert("Entre ton pseudo !");return;}
  S.pseudo=pseudo;
  saveS();
  launchApp();
}
function launchApp(){
  var ob=document.getElementById("sc-onboard");
  if(ob){ob.style.display="none";ob.classList.remove("on");}
  document.getElementById("bnav").classList.add("show");
  navTo("home");
  initFixtures();
}
window.addEventListener("DOMContentLoaded",function(){
  loadS();
  if(S.pseudo)launchApp();
});
</script>
</body>
</html>
