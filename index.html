<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0B1629"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sunday Picks"/>
<link rel="apple-touch-icon" href="https://i.imgur.com/qaj1nmJ.png"/>
<link rel="icon" href="https://i.imgur.com/qaj1nmJ.png"/>
<title>Sunday Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0B1629; --bg2: #0F1E36; --card: #13203A; --card2: #192B47;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.13);
  --red: #E8233A; --green: #22C55E; --gold: #F5A623;
  --text: #E8EDF5; --muted: #6B7F9E; --muted2: #4A5C75;
  --fd: 'Barlow Condensed', sans-serif; --fb: 'Barlow', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--fb); }
.app { max-width: 430px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
.scr { display: none; flex: 1; overflow-y: auto; flex-direction: column; -webkit-overflow-scrolling: touch; }
.scr.on { display: flex; }
.scr::-webkit-scrollbar { display: none; }
.bnav { display: none; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; }
.bnav.show { display: flex; }
.bnav button { flex: 1; background: none; border: none; padding: 10px 0 8px; color: var(--muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: var(--fb); font-size: 10px; font-weight: 600; letter-spacing: 0.5px; transition: color 0.2s; }
.bnav button.act { color: var(--red); }
.bnav button svg { width: 22px; height: 22px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 16px; }
.btn-red { width: 100%; padding: 15px; background: var(--red); border: none; border-radius: 12px; color: #fff; font-family: var(--fd); font-size: 17px; font-weight: 800; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-red.btn-green { background: #16A34A; }
@keyframes sp { 0%,100%{opacity:1}50%{opacity:0.3} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
.fade { animation: fadeIn 0.3s ease; }

/* ONBOARDING */
#sc-onboard { background: var(--bg); align-items: center; justify-content: center; padding: 40px 32px; }
.ob-logo { width: 100px; height: 100px; margin-bottom: 32px; }
.ob-title { font-family: var(--fd); font-size: 52px; font-weight: 900; letter-spacing: 2px; text-align: center; line-height: 1; margin-bottom: 8px; }
.ob-title span { color: var(--red); }
.ob-sub { font-size: 15px; color: var(--muted); text-align: center; margin-bottom: 48px; letter-spacing: 1px; }
.ob-label { font-family: var(--fd); font-size: 12px; font-weight: 700; letter-spacing: 3px; color: var(--muted); margin-bottom: 10px; }
.ob-input { width: 100%; padding: 14px 18px; background: var(--card2); border: 1.5px solid var(--border2); border-radius: 12px; color: var(--text); font-family: var(--fb); font-size: 16px; outline: none; margin-bottom: 24px; }
.ob-input:focus { border-color: var(--red); }

/* HOME */
#sc-home { padding: 0; }
.h-header { padding: 16px 18px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.h-greet { font-family: var(--fd); font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--muted); }
.h-body { padding: 0 18px 100px; flex: 1; }

/* TOURNOI CARD */
.t-card { background: linear-gradient(135deg,#162847,#0F1E36 60%,#1a0a0a); border: 1px solid var(--border2); border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
.t-card-body { padding: 18px; }

/* SCORE */
.score-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; }
.score-num { font-family: var(--fd); font-size: 44px; font-weight: 900; line-height: 1; }
.score-badge-name { font-family: var(--fd); font-size: 13px; font-weight: 800; letter-spacing: 2px; color: var(--red); margin-top: 2px; }
.score-emoji { font-size: 52px; margin-left: auto; }
.prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.prog-label { font-family: var(--fd); font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted); }
.prog-bar-bg { background: var(--card2); border-radius: 4px; height: 6px; margin-bottom: 16px; }
.prog-bar { background: linear-gradient(90deg,var(--red),#ff6b35); height: 6px; border-radius: 4px; transition: width 0.6s ease; }

/* PROCHAINS */
.proch-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.proch-title { font-family: var(--fd); font-size: 12px; font-weight: 700; letter-spacing: 3px; color: var(--muted); }
.refresh-btn { background: var(--card); border: 1px solid var(--border2); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); }

/* PICKS */
#sc-picks { padding: 0; }
.pk-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
#pk-content { padding: 16px 18px 160px; flex: 1; overflow-y: auto; }
#pk-content::-webkit-scrollbar { display: none; }
#vbar { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 12px 18px; background: var(--bg2); border-top: 1px solid var(--border); }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; }
.modal-box { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-height: 80vh; display: flex; flex-direction: column; }
.modal-header { padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-list { overflow-y: auto; flex: 1; padding: 8px 0; }
.modal-list::-webkit-scrollbar { display: none; }
.modal-item { padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); cursor: pointer; }
.modal-item:active { background: var(--card); }
.search-box { padding: 10px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-input { width: 100%; padding: 10px 14px; background: var(--card); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: var(--fb); font-size: 14px; outline: none; }

/* CLASSEMENT */
#sc-class { padding: 0; }
.cl-header { padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }

/* PROFIL */
#sc-profil { padding: 16px 18px 100px; }

/* HISTORIQUE */
#sc-hdet { padding: 0; }
.hdet-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }

.box-err { background: rgba(232,35,58,0.1); border: 1px solid rgba(232,35,58,0.3); border-radius: 10px; padding: 12px 16px; color: var(--red); font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app">

<!-- ONBOARDING -->
<div class="scr on" id="sc-onboard" style="flex-direction:column;">
  <img class="ob-logo" src="https://i.imgur.com/qaj1nmJ.png" alt="logo"/>
  <div class="ob-title">SUNDAY<br/><span>PICKS</span></div>
  <div class="ob-sub">Pronos. Analyse. Performance.</div>
  <div style="width:100%;">
    <div class="ob-label">TON PSEUDO</div>
    <input class="ob-input" id="ob-pseudo" type="text" placeholder="GolfAddict" maxlength="20" autocomplete="off"/>
    <button class="btn-red" onclick="startApp()">COMMENCER →</button>
  </div>
</div>

<!-- HOME -->
<div class="scr" id="sc-home">
  <div class="h-header">
    <img src="https://i.imgur.com/qaj1nmJ.png" style="width:40px;height:40px;border-radius:50%;"/>
    <div class="h-greet" id="h-greet">BONJOUR</div>
  </div>
  <div class="h-body">

    <!-- TOURNOI PGA -->
    <div class="t-card" id="h-card-pga">
      <div class="t-card-body">
        <div id="h-live-pga" style="margin-bottom:8px;"></div>
        <div style="font-family:var(--fd);font-size:26px;font-weight:900;line-height:1.1;letter-spacing:1px;margin-bottom:4px;" id="h-name-pga">Chargement...</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="h-loc-pga">—</span>
        </div>
        <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:14px;margin-bottom:16px;">
          <div style="font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:8px;">FIN DES PICKS DANS</div>
          <div style="display:flex;gap:8px;justify-content:center;">
            <div style="text-align:center;"><div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);" id="h-d-pga">00</div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;">JOURS</div></div>
            <div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);padding-top:4px;">:</div>
            <div style="text-align:center;"><div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);" id="h-h-pga">00</div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;">HRS</div></div>
            <div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);padding-top:4px;">:</div>
            <div style="text-align:center;"><div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);" id="h-m-pga">00</div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;">MIN</div></div>
            <div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);padding-top:4px;">:</div>
            <div style="text-align:center;"><div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--gold);" id="h-s-pga">00</div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;">SEC</div></div>
          </div>
        </div>
        <button class="btn-red" id="h-btn-pga" onclick="goToPicks()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          FAIRE MES PICKS
        </button>
      </div>
    </div>

    <!-- SCORE -->
    <div class="score-box">
      <div style="flex:1;">
        <div class="score-num"><span id="h-score">0</span> <span style="font-size:18px;color:var(--muted);">PTS</span></div>
        <div class="score-badge-name" id="h-badge-name">MONSIEUR PROVISOIRE</div>
      </div>
      <div class="score-emoji" id="h-badge-img">🏌️</div>
    </div>

    <!-- PROGRESSION -->
    <div class="prog-row">
      <div class="prog-label">PROGRESSION</div>
      <div style="font-size:12px;" id="h-prog-txt"></div>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar" id="h-prog-bar" style="width:0%;"></div></div>

    <!-- PROCHAINS -->
    <div class="proch-header">
      <div class="proch-title">PROCHAINS TOURNOIS</div>
      <button class="refresh-btn" onclick="loadFixtures(true)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      </button>
    </div>
    <div id="h-prochains"><div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">Chargement...</div></div>
  </div>
</div>

<!-- PICKS -->
<div class="scr" id="sc-picks">
  <div class="pk-header">
    <button onclick="navTo('home')" style="background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;line-height:1;">←</button>
    <div style="font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:1px;flex:1;text-align:center;" id="pk-title">MES PICKS</div>
    <button onclick="savePicks()" style="background:none;border:none;color:var(--red);font-family:var(--fd);font-size:15px;font-weight:800;letter-spacing:1px;cursor:pointer;">Valider</button>
  </div>
  <div id="pk-content" style="padding:16px 18px 160px;flex:1;overflow-y:auto;"></div>
  <div id="vbar" style="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 18px;background:var(--bg2);border-top:1px solid var(--border);">
    <button class="btn-red" id="vbtn" onclick="savePicks()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      VALIDER MES PICKS
    </button>
  </div>
</div>

<!-- CLASSEMENT -->
<div class="scr" id="sc-class">
  <div class="cl-header">
    <div style="font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:2px;">CLASSEMENT</div>
  </div>
  <div id="cl-content" style="padding:16px 18px 100px;flex:1;overflow-y:auto;"></div>
</div>

<!-- PROFIL -->
<div class="scr" id="sc-profil">
  <div style="font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:2px;margin-bottom:20px;">MON PROFIL</div>
  <div id="profil-content"></div>
</div>

<!-- HISTORIQUE DETAIL -->
<div class="scr" id="sc-hdet">
  <div class="hdet-header">
    <button onclick="navTo('profil')" style="background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;line-height:1;">←</button>
    <div style="font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:1px;flex:1;text-align:center;" id="hdet-title">DÉTAIL</div>
  </div>
  <div id="hdet-content" style="padding:16px 18px 100px;flex:1;overflow-y:auto;"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bnav">
  <button onclick="navTo('home')" id="nav-home" class="act">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </button>
  <button onclick="navTo('class')" id="nav-class">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Classement
  </button>
  <button onclick="goToPicks()" id="nav-picks">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Picks
  </button>
  <button onclick="navTo('profil')" id="nav-profil">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profil
  </button>
</nav>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
var API_KEY = "39c5cc9625mshc2f52e154b3255fp11e5b9jsn0f4c49435a11";
var API_HOST = "golf-leaderboard-data.p.rapidapi.com";
var STORE_KEY = "sp_v10";

// ============================================================
// BADGES
// ============================================================
var BADGES = [
  {name:"Monsieur Provisoire", emoji:"🏌️", pts:0},
  {name:"Bogeyman", emoji:"😤", pts:1000},
  {name:"Par Seeker", emoji:"🎯", pts:3000},
  {name:"Birdie Hunter", emoji:"🐦", pts:6000},
  {name:"Eagle Eye", emoji:"🦅", pts:12000},
  {name:"Tiger Woods connecté", emoji:"🐯", pts:25000}
];

// ============================================================
// STATE
// ============================================================
var S = {
  pseudo: "",
  pts: 0,
  history: [],
  tid: null,
  picks: { top3: [null,null,null], tenPicks: {}, tenPlayers: [] },
  saved: false,
  fixtures: [],
  fixtOk: false,
  players: [],
  playOk: false
};

// ============================================================
// PERSIST
// ============================================================
function saveS() {
  localStorage.setItem(STORE_KEY, JSON.stringify({
    pseudo: S.pseudo, pts: S.pts, history: S.history,
    tid: S.tid, picks: S.picks, saved: S.saved
  }));
}

function loadS() {
  try {
    var d = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
    S.pseudo = d.pseudo || "";
    S.pts    = d.pts    || 0;
    S.history= d.history|| [];
    S.tid    = d.tid    || null;
    S.picks  = d.picks  || { top3:[null,null,null], tenPicks:{}, tenPlayers:[] };
    S.saved  = d.saved  || false;
  } catch(e) {}
}

// ============================================================
// HELPERS
// ============================================================
function getBadge(pts) {
  var b = BADGES[0];
  for (var i = 0; i < BADGES.length; i++) { if (pts >= BADGES[i].pts) b = BADGES[i]; }
  return b;
}
function getNextBadge(pts) {
  for (var i = 0; i < BADGES.length; i++) { if (BADGES[i].pts > pts) return BADGES[i]; }
  return null;
}
function getProgress(pts) {
  var cur = getBadge(pts), nxt = getNextBadge(pts);
  if (!nxt) return 100;
  return Math.min(100, Math.round((pts - cur.pts) / (nxt.pts - cur.pts) * 100));
}
function fmtDate(d) {
  if (!d) return "—";
  var dt = d instanceof Date ? d : new Date(d);
  return dt.toLocaleDateString("fr-FR", {day:"numeric", month:"short"});
}
function pad(n) { return String(n).padStart(2,"0"); }

// ============================================================
// API
// ============================================================
function apiCall(path) {
  return fetch("https://" + API_HOST + path, {
    headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": API_HOST }
  }).then(function(r) {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  });
}

// ============================================================
// FIXTURES
// ============================================================
function loadFixtures(force) {
  if (S.fixtOk && !force) { renderHome(); renderProchains(); return; }
  var el = document.getElementById("h-prochains");
  if (el) el.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">Chargement...</div>';

  Promise.all([
    apiCall("/fixtures/2/2026").catch(function() { return { results: [] }; }),
    apiCall("/tour-rankings/2/2026").catch(function() { return { results: {} }; })
  ]).then(function(res) {
    var fixtData = res[0];
    var rankData = res[1];

    // Build rankings map
    var ranks = {};
    var rankList = (rankData.results && rankData.results.rankings) ? rankData.results.rankings : [];
    rankList.forEach(function(p) { ranks[p.player_id] = p.position; });
    S.rankMap = ranks;

    // Process fixtures
    var all = [];
    (fixtData.results || []).forEach(function(f) {
      if (!f.start_date) return;
      var fStart = new Date(f.start_date);
      var fEnd   = new Date(f.end_date || f.start_date);
      // Deadline = start of tournament (picks close when tournament begins)
      // Exception: if tournament ends this week, keep picks open until end of day
      var today = new Date().toISOString().substring(0,10);
      var endStr = fEnd.toISOString().substring(0,10);
      var deadline;
      if (endStr <= "2026-05-26") {
        deadline = new Date("2026-05-26T22:00:00Z"); // keep open this week
      } else {
        deadline = new Date(fStart);
      }
      all.push({
        id: String(f.id),
        name: f.name,
        tour: "PGA",
        loc: (f.course || "") + (f.country ? ", " + f.country : ""),
        start: fStart,
        end: fEnd,
        deadline: deadline,
        status: f.status || "pre"
      });
    });

    S.fixtures = all.sort(function(a,b) { return a.start - b.start; });
    S.fixtOk = true;

    // Find current tournament
    var now = new Date();
    var live = null, ongoing = null, next = null, past = null;
    for (var i = 0; i < S.fixtures.length; i++) {
      var f = S.fixtures[i];
      var fEnd2 = new Date(f.end); fEnd2.setHours(23,59,59,999);
      if (!live && (f.status === "inprogress" || f.status === "live")) live = f;
      if (!ongoing && f.start <= now && fEnd2 >= now) ongoing = f;
      if (!next && f.start > now) next = f;
    }
    for (var j = S.fixtures.length-1; j >= 0; j--) {
      var fj = S.fixtures[j];
      var fjEnd = new Date(fj.end); fjEnd.setHours(23,59,59,999);
      if (fjEnd < now) { past = fj; break; }
    }

    var cur = live || ongoing || next || past;
    if (cur && cur.id !== S.tid) {
      S.tid = cur.id;
      S.picks = { top3:[null,null,null], tenPicks:{}, tenPlayers:[] };
      S.saved = false;
      saveS();
    } else if (!S.tid && cur) {
      S.tid = cur.id;
      saveS();
    }

    renderHome();
    renderProchains();
    if (cur) loadPlayers(cur.id);

  }).catch(function(e) {
    if (el) el.innerHTML = '<div class="box-err">Erreur chargement: ' + e.message + '</div>';
  });
}

// ============================================================
// PLAYERS
// ============================================================
function loadPlayers(tid) {
  if (!tid) return;
  S.playOk = false;

  apiCall("/entry-list/" + tid).then(function(data) {
    var list = (data.results && data.results.entry_list) ? data.results.entry_list : (data.results || []);
    S.players = list.map(function(e) {
      var rank = (S.rankMap && S.rankMap[e.player_id]) || 999;
      var coeff = rank <= 5 ? 1.5 : rank <= 10 ? 2.0 : rank <= 20 ? 2.5 : rank <= 30 ? 3.0 : rank <= 50 ? 4.0 : rank <= 75 ? 5.0 : rank <= 100 ? 6.0 : rank <= 150 ? 7.0 : 8.0;
      return {
        id: String(e.player_id),
        name: (e.first_name || "") + " " + (e.last_name || ""),
        wr: rank,
        coeff: coeff
      };
    }).sort(function(a,b) { return a.wr - b.wr; });

    S.playOk = true;
    if (!S.picks.tenPlayers || !S.picks.tenPlayers.length) {
      S.picks.tenPlayers = genTen();
      saveS();
    }
    var pkScr = document.getElementById("sc-picks");
    if (pkScr && pkScr.classList.contains("on")) renderPicks();
  }).catch(function(e) {
    console.error("loadPlayers error:", e);
  });
}

function genTen() {
  if (!S.players.length) return [];
  var top  = S.players.slice(0, 5).map(function(p) { return p.id; });
  var rest = S.players.slice(5, 50).sort(function() { return Math.random()-0.5; }).slice(0,5).map(function(p) { return p.id; });
  return top.concat(rest);
}

function getP(id) {
  for (var i = 0; i < S.players.length; i++) {
    if (S.players[i].id === id) return S.players[i];
  }
  return null;
}

function picksDone() {
  var p = S.picks;
  if (p.top3.filter(Boolean).length < 3) return false;
  var ten = p.tenPlayers || [];
  for (var i = 0; i < 10 && i < ten.length; i++) {
    if (!p.tenPicks[ten[i]]) return false;
  }
  return true;
}

// ============================================================
// TIMER
// ============================================================
var tmrId = null;
function startTimer() {
  if (tmrId) clearInterval(tmrId);
  function tick() {
    var cur = getCur();
    if (!cur) return;
    var dl   = cur.deadline || cur.start;
    var diff = new Date(dl) - new Date();
    var ids  = ["h-d-pga","h-h-pga","h-m-pga","h-s-pga"];
    if (diff <= 0) {
      ids.forEach(function(id) { var el = document.getElementById(id); if(el) el.textContent = "00"; });
      return;
    }
    var tot = Math.floor(diff/1000);
    var vals = [Math.floor(tot/86400), Math.floor((tot%86400)/3600), Math.floor((tot%3600)/60), tot%60];
    ids.forEach(function(id,i) { var el = document.getElementById(id); if(el) el.textContent = pad(vals[i]); });
  }
  tick();
  tmrId = setInterval(tick, 1000);
}

// ============================================================
// CURRENT TOURNAMENT
// ============================================================
function getCur() {
  for (var i = 0; i < S.fixtures.length; i++) {
    if (S.fixtures[i].id === S.tid) return S.fixtures[i];
  }
  return null;
}

function isDeadlinePassed() {
  var cur = getCur();
  if (!cur) return false;
  return new Date() > new Date(cur.deadline || cur.start);
}

// ============================================================
// RENDER HOME
// ============================================================
function renderHome() {
  var cur   = getCur();
  var badge = getBadge(S.pts);
  var nxt   = getNextBadge(S.pts);
  var prog  = getProgress(S.pts);
  var h     = new Date().getHours();

  // Greeting
  var greetEl = document.getElementById("h-greet");
  if (greetEl) greetEl.textContent = (h < 18 ? "BONJOUR " : "BONSOIR ") + S.pseudo.toUpperCase();

  // Tournament card
  if (cur) {
    var nameEl = document.getElementById("h-name-pga");
    var locEl  = document.getElementById("h-loc-pga");
    var liveEl = document.getElementById("h-live-pga");
    var btnEl  = document.getElementById("h-btn-pga");

    if (nameEl) nameEl.textContent = cur.name;
    if (locEl)  locEl.textContent  = cur.loc || "—";

    var isLive = cur.status === "inprogress" || cur.status === "live";
    if (liveEl) liveEl.innerHTML = isLive
      ? '<div style="display:inline-flex;align-items:center;gap:5px;background:var(--red);color:#fff;font-family:var(--fd);font-size:11px;font-weight:800;letter-spacing:2px;padding:4px 10px;border-radius:6px;margin-bottom:6px;"><div style="width:6px;height:6px;border-radius:50%;background:#fff;animation:sp 1.2s infinite;"></div>LIVE</div>'
      : "";

    // Button state
    if (btnEl) {
      if (isDeadlinePassed() && !S.saved) {
        btnEl.style.background = "var(--muted2)";
        btnEl.innerHTML = "🔒 PICKS FERMÉS";
        btnEl.onclick = null;
      } else if (S.saved) {
        btnEl.style.background = "#16A34A";
        btnEl.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> PICKS ENREGISTRÉS';
        btnEl.onclick = goToPicks;
      } else {
        btnEl.style.background = "var(--red)";
        btnEl.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg> FAIRE MES PICKS';
        btnEl.onclick = goToPicks;
      }
    }
  }

  // Score
  var scoreEl = document.getElementById("h-score");
  var badgeEl = document.getElementById("h-badge-name");
  var badgeImg= document.getElementById("h-badge-img");
  var progBar = document.getElementById("h-prog-bar");
  var progTxt = document.getElementById("h-prog-txt");

  if (scoreEl)  scoreEl.textContent  = S.pts;
  if (badgeEl)  badgeEl.textContent  = badge.name.toUpperCase();
  if (badgeImg) badgeImg.textContent = badge.emoji;
  if (progBar)  progBar.style.width  = prog + "%";
  if (progTxt && nxt) progTxt.innerHTML = '<span style="color:var(--red);">' + nxt.pts + ' pts → ' + nxt.name + '</span>';

  startTimer();
  renderProchains();
}

// ============================================================
// RENDER PROCHAINS
// ============================================================
function renderProchains() {
  var el  = document.getElementById("h-prochains");
  if (!el) return;
  var now = new Date();
  var list = S.fixtures.filter(function(f) {
    var fEnd = new Date(f.end); fEnd.setHours(23,59,59,999);
    return f.id !== S.tid && fEnd >= now;
  }).slice(0, 8);

  if (!list.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">Aucun tournoi à venir</div>';
    return;
  }

  var h = "";
  list.forEach(function(t) {
    h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;">';
    h += '<div style="width:40px;height:40px;background:rgba(232,35,58,0.15);border:1.5px solid var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">';
    h += '<span style="font-family:var(--fd);font-size:10px;font-weight:900;color:var(--red);">PGA</span></div>';
    h += '<div style="flex:1;">';
    h += '<div style="font-family:var(--fd);font-size:15px;font-weight:700;">' + t.name + '</div>';
    h += '<div style="display:flex;align-items:center;gap:6px;margin-top:3px;">';
    h += '<span style="font-size:10px;background:rgba(232,35,58,0.15);color:var(--red);padding:2px 7px;border-radius:6px;font-family:var(--fd);font-weight:800;letter-spacing:1px;">PGA</span>';
    h += '<span style="font-size:12px;color:var(--muted);">' + fmtDate(t.start) + ' — ' + fmtDate(t.end) + '</span>';
    h += '</div></div></div>';
  });
  el.innerHTML = h;
}

// ============================================================
// RENDER PICKS
// ============================================================
function renderPicks() {
  var el  = document.getElementById("pk-content");
  if (!el) return;

  // Update title
  var cur = getCur();
  var title = document.getElementById("pk-title");
  if (title && cur) {
    var t = cur.name.length > 20 ? cur.name.substring(0,20)+"..." : cur.name;
    title.textContent = t.toUpperCase();
  }

  // Locked?
  if (isDeadlinePassed()) {
    var vbar = document.getElementById("vbar");
    if (vbar) vbar.style.display = "none";
    el.innerHTML = '<div style="text-align:center;padding:60px 24px;">' +
      '<div style="font-size:64px;margin-bottom:16px;">🔒</div>' +
      '<div style="font-family:var(--fd);font-size:24px;font-weight:900;letter-spacing:1px;margin-bottom:8px;">PICKS FERMÉS</div>' +
      '<div style="font-size:14px;color:var(--muted);line-height:1.5;">Le tournoi est en cours.<br/>Les picks sont verrouillés.</div>' +
      (S.saved ? '<div style="margin-top:24px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:16px;"><div style="font-family:var(--fd);font-size:14px;font-weight:700;color:var(--green);margin-bottom:6px;">TES PICKS ENREGISTRÉS ✓</div><div style="font-size:13px;color:var(--muted);">Attends les résultats !</div></div>' : '') +
      '</div>';
    return;
  }

  var vbar2 = document.getElementById("vbar");
  var vbtn  = document.getElementById("vbtn");
  if (vbar2) vbar2.style.display = "block";
  if (vbtn)  vbtn.disabled = !picksDone();

  if (!S.playOk && !S.players.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px 24px;color:var(--muted);">Chargement des joueurs...</div>';
    return;
  }

  var p    = S.picks;
  var html = "";
  var cats = ["Top 5","Top 10","Top 20","Top 30","Make Cut"];

  // TOP 3
  html += '<div style="font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:12px;">TON TOP 3</div>';
  var medals = ["🥇 1ER","🥈 2ÈME","🥉 3ÈME"];
  for (var i = 0; i < 3; i++) {
    var pid = p.top3[i];
    var pl  = pid ? getP(pid) : null;
    html += '<div onclick="openModal(\'top3\',' + i + ')" style="background:var(--card);border:1px solid ' + (pl ? 'var(--border2)' : 'rgba(232,35,58,0.4)') + ';border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">';
    html += '<div style="display:flex;align-items:center;gap:10px;">';
    html += '<span style="font-family:var(--fd);font-size:13px;font-weight:700;color:var(--muted);">' + medals[i] + '</span>';
    if (pl) {
      html += '<div><div style="font-family:var(--fd);font-size:15px;font-weight:800;">' + pl.name + '</div>';
      html += '<div style="font-size:11px;color:var(--muted);">×' + pl.coeff + ' · Rang #' + pl.wr + '</div></div>';
    } else {
      html += '<span style="color:var(--muted);font-size:14px;">Choisir un joueur</span>';
    }
    html += '</div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>';
  }

  // 10 PICKS
  html += '<div style="font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);margin:20px 0 12px;">TES 10 PICKS</div>';
  var ten = p.tenPlayers && p.tenPlayers.length ? p.tenPlayers : genTen();
  for (var j = 0; j < 10 && j < ten.length; j++) {
    var tp  = getP(ten[j]);
    if (!tp) continue;
    var cat = p.tenPicks[ten[j]] || "";
    html += '<div onclick="openModal(\'ten\',\'' + ten[j] + '\')" style="background:var(--card);border:1px solid ' + (cat ? 'var(--border2)' : 'rgba(232,35,58,0.4)') + ';border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">';
    html += '<div><div style="font-family:var(--fd);font-size:15px;font-weight:800;">' + tp.name + '</div>';
    html += '<div style="font-size:11px;color:var(--muted);">×' + tp.coeff + ' · Rang #' + tp.wr + '</div></div>';
    html += '<div style="font-family:var(--fd);font-size:12px;font-weight:700;color:' + (cat ? 'var(--green)' : 'var(--red)') + ';">' + (cat || "CHOISIR") + '</div></div>';
  }

  el.innerHTML = html;
}

// ============================================================
// MODAL
// ============================================================
var modalType = null, modalIdx = null;

function openModal(type, idx) {
  modalType = type; modalIdx = idx;
  var bg = document.getElementById("modal-bg");
  if (bg) { bg.style.display = "flex"; renderModal(); return; }

  var div = document.createElement("div");
  div.id = "modal-bg";
  div.className = "modal-bg";
  div.innerHTML = '<div class="modal-box"><div class="modal-header">' +
    '<div style="font-family:var(--fd);font-size:16px;font-weight:800;letter-spacing:1px;" id="modal-title">CHOISIR</div>' +
    '<button onclick="closeModal()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;">×</button></div>' +
    '<div class="search-box"><input class="search-input" id="modal-search" placeholder="Rechercher..." oninput="filterModal(this.value)" autocomplete="off"/></div>' +
    '<div class="modal-list" id="modal-list"></div></div>';
  document.querySelector(".app").appendChild(div);
  renderModal();
}

function renderModal() {
  var title = document.getElementById("modal-title");
  var listEl = document.getElementById("modal-list");
  var search = document.getElementById("modal-search");
  if (search) { search.value = ""; }

  if (modalType === "top3") {
    if (title) title.textContent = "CHOISIR — " + ["1ER","2ÈME","3ÈME"][modalIdx];
    filterModal("");
  } else if (modalType === "ten") {
    if (title) title.textContent = "PRONOSTIC";
    var cats = ["Top 5","Top 10","Top 20","Top 30","Make Cut"];
    var tp = getP(modalIdx);
    var html = tp ? '<div style="padding:14px 18px;border-bottom:1px solid var(--border);"><div style="font-family:var(--fd);font-size:16px;font-weight:800;">' + tp.name + '</div><div style="font-size:12px;color:var(--muted);">×' + tp.coeff + ' · Rang #' + tp.wr + '</div></div>' : "";
    cats.forEach(function(c) {
      html += '<div class="modal-item" onclick="selectCat(\'' + modalIdx + '\',\'' + c + '\')">' +
        '<span>' + c + '</span>' +
        '<span style="font-size:13px;color:var(--muted);">×' + (getP(modalIdx) ? getP(modalIdx).coeff : "?") + '</span></div>';
    });
    if (listEl) listEl.innerHTML = html;
  }
}

function filterModal(q) {
  var listEl = document.getElementById("modal-list");
  if (!listEl) return;
  var q2 = q.toLowerCase().trim();
  var fil = S.players.filter(function(p) {
    return p.name.toLowerCase().indexOf(q2) !== -1;
  }).slice(0, 60);
  var html = "";
  fil.forEach(function(p) {
    var sel = S.picks.top3.indexOf(p.id) !== -1;
    html += '<div class="modal-item" onclick="selectPlayer(\'' + p.id + '\')" style="' + (sel ? 'opacity:0.4;pointer-events:none;' : '') + '">';
    html += '<div><div style="font-family:var(--fd);font-size:15px;font-weight:700;">' + p.name + '</div>';
    html += '<div style="font-size:11px;color:var(--muted);">×' + p.coeff + ' · Rang #' + p.wr + '</div></div>';
    html += '<span style="font-family:var(--fd);font-size:13px;color:var(--muted);">×' + p.coeff + '</span></div>';
  });
  listEl.innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--muted);">Aucun résultat</div>';
}

function selectPlayer(id) {
  S.picks.top3[modalIdx] = id;
  saveS();
  closeModal();
  renderPicks();
}

function selectCat(pid, cat) {
  S.picks.tenPicks[pid] = cat;
  saveS();
  closeModal();
  renderPicks();
}

function closeModal() {
  var bg = document.getElementById("modal-bg");
  if (bg) bg.style.display = "none";
}

// ============================================================
// SAVE PICKS
// ============================================================
function savePicks() {
  if (!picksDone()) {
    alert("Complete tes 3 tops et tes 10 picks d'abord !");
    return;
  }
  S.saved = true;
  saveS();
  renderHome();
  renderPicks();
  navTo("home");
}

// ============================================================
// NAVIGATION
// ============================================================
var SCREENS = { home:"sc-home", class:"sc-class", picks:"sc-picks", profil:"sc-profil", hdet:"sc-hdet" };

function navTo(tab) {
  Object.keys(SCREENS).forEach(function(k) {
    var el = document.getElementById(SCREENS[k]);
    if (el) el.classList.toggle("on", k === tab);
  });
  document.querySelectorAll(".bnav button").forEach(function(b) { b.classList.remove("act"); });
  var nb = document.getElementById("nav-" + tab);
  if (nb) nb.classList.add("act");

  if (tab === "picks")  renderPicks();
  if (tab === "class")  renderClassement();
  if (tab === "profil") renderProfil();
}

function goToPicks() {
  navTo("picks");
}

// ============================================================
// CLASSEMENT
// ============================================================
function renderClassement() {
  var el = document.getElementById("cl-content");
  if (!el) return;
  var all = [{ pseudo: S.pseudo, pts: S.pts, badge: getBadge(S.pts) }];
  var html = '';
  all.sort(function(a,b) { return b.pts - a.pts; });
  all.forEach(function(u, i) {
    html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">';
    html += '<div style="font-family:var(--fd);font-size:24px;font-weight:900;color:var(--muted);width:30px;">' + (i+1) + '</div>';
    html += '<div style="font-size:28px;">' + u.badge.emoji + '</div>';
    html += '<div style="flex:1;"><div style="font-family:var(--fd);font-size:16px;font-weight:800;">' + u.pseudo + '</div>';
    html += '<div style="font-size:12px;color:var(--muted);">' + u.badge.name + '</div></div>';
    html += '<div style="font-family:var(--fd);font-size:20px;font-weight:900;">' + u.pts + '<span style="font-size:12px;color:var(--muted);"> pts</span></div></div>';
  });
  el.innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--muted);">Aucun joueur</div>';
}

// ============================================================
// PROFIL
// ============================================================
function renderProfil() {
  var el = document.getElementById("profil-content");
  if (!el) return;
  var badge = getBadge(S.pts);
  var nxt   = getNextBadge(S.pts);
  var prog  = getProgress(S.pts);

  var html = '<div style="text-align:center;padding:20px 0 32px;">';
  html += '<div style="font-size:72px;margin-bottom:8px;">' + badge.emoji + '</div>';
  html += '<div style="font-family:var(--fd);font-size:28px;font-weight:900;">' + S.pseudo.toUpperCase() + '</div>';
  html += '<div style="font-family:var(--fd);font-size:16px;color:var(--red);font-weight:700;letter-spacing:1px;margin-top:4px;">' + badge.name.toUpperCase() + '</div>';
  html += '<div style="font-family:var(--fd);font-size:40px;font-weight:900;margin-top:16px;">' + S.pts + ' <span style="font-size:18px;color:var(--muted);">pts</span></div>';
  html += '</div>';

  if (nxt) {
    html += '<div style="margin-bottom:24px;">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--muted);">';
    html += '<span>Vers ' + nxt.name + '</span><span>' + prog + '%</span></div>';
    html += '<div class="prog-bar-bg"><div class="prog-bar" style="width:' + prog + '%;"></div></div></div>';
  }

  // History
  if (S.history.length) {
    html += '<div style="font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:12px;">HISTORIQUE</div>';
    S.history.slice().reverse().forEach(function(h) {
      html += '<div onclick="showHdet(\'' + h.tid + '\')" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">';
      html += '<div><div style="font-family:var(--fd);font-size:15px;font-weight:700;">' + h.name + '</div>';
      html += '<div style="font-size:12px;color:var(--muted);">' + fmtDate(h.date) + '</div></div>';
      html += '<div style="font-family:var(--fd);font-size:18px;font-weight:900;color:var(--gold);">+' + h.pts + ' pts</div></div>';
    });
  }

  el.innerHTML = html;
}

function showHdet(tid) {
  var h = S.history.find(function(x) { return x.tid === tid; });
  if (!h) return;
  var title = document.getElementById("hdet-title");
  var content = document.getElementById("hdet-content");
  if (title) title.textContent = h.name.toUpperCase();
  if (content) content.innerHTML = '<div style="padding:20px 0;text-align:center;"><div style="font-family:var(--fd);font-size:48px;font-weight:900;color:var(--gold);">+' + h.pts + '</div><div style="color:var(--muted);font-size:14px;">points gagnés</div></div>';
  navTo("hdet");
}

// ============================================================
// START APP
// ============================================================
function startApp() {
  var pseudo = document.getElementById("ob-pseudo").value.trim();
  if (!pseudo) { alert("Entre ton pseudo !"); return; }
  S.pseudo = pseudo;
  saveS();
  launchApp();
}

function launchApp() {
  document.getElementById("sc-onboard").classList.remove("on");
  document.getElementById("sc-home").classList.add("on");
  document.getElementById("bnav").classList.add("show");
  navTo("home");
  loadFixtures(false);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener("DOMContentLoaded", function() {
  loadS();
  if (S.pseudo) {
    launchApp();
  }
